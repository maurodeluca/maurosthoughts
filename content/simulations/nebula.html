<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crab Nebula — M1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; width: 100%; height: 100%; }
  #info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(180,220,200,0.4); font-family: 'Courier New', monospace;
    font-size: 11px; letter-spacing: 0.15em; text-align: center;
    pointer-events: none; text-transform: uppercase;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">Crab Nebula — M1 · Supernova Remnant · Scroll to zoom · Drag to orbit</div>
  <div id="radio-player" class="radio-player" aria-hidden="false">
    <div class="radio-controls-compact">
      <svg class="music-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16"
        fill="var(--accent)">
        <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z" />
      </svg>
      <button class="radio-play" aria-label="Play/Pause" data-playing="false">▶</button>
      <button id="radio-minimize" aria-label="Toggle Radio">
        <!-- Minimize: horizontal bar -->
        <svg class="radio-icon" width="14" height="14" viewBox="0 0 24 24" fill="none">
          <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2" />
        </svg>
      </button>
    </div>
    <div class="radio-progress" title="Live progress">
      <div class="radio-progress-fill"></div>
    </div>
    <input class="radio-volume" type="range" min="0" max="1" step="0.01" value="0.5" aria-label="Volume">
  </div>
<script type="module" src="/js/nebula.js"></script>
<script type="module" src="/js/radio.js"></script>
</body>
</html>
