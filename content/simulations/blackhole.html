<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>maurosthoughts - gargantua</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --accent: #8f0f1a;
      --accent-soft: rgba(143, 15, 26, 0.45);
      --text-muted: #c7b2b5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #ui {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;

      color: var(--text-muted);

      padding: 10px 18px;
      border: 1px solid var(--accent-soft);
      border-radius: 4px;

      background: rgba(143, 15, 26, 0.08);
      box-shadow: 0 0 18px rgba(143, 15, 26, 0.25);
    }
  </style>
</head>

<body>
  <canvas id="glCanvas"></canvas>
  <div id="ui">Drag to orbit &nbsp;·&nbsp; Scroll to zoom</div>
  <script type="module" src="/js/blackhole.js"></script>
</body>

</html>
