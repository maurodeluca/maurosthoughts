<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>maurosthoughts - Supernova Remnant — Cas A</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #8f0f1a;
            --accent-soft: rgba(143, 15, 26, 0.45);
            --text-muted: #c7b2b5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: fixed;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            white-space: nowrap;
            z-index: 10;
            pointer-events: none;

            color: var(--text-muted);

            padding: 10px 18px;
            border: 1px solid var(--accent-soft);
            border-radius: 4px;

            background: rgba(143, 15, 26, 0.08);
            box-shadow: 0 0 18px rgba(143, 15, 26, 0.25);
        }

        #nav {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            font-size: 4.0rem;
            color: var(--text-muted);
            /* above the canvas */
            background: rgba(0, 0, 0, 0.5);
        }

        #nav a {
            display: block;
            margin-bottom: 6px;
            color: var(--text);
            text-decoration: none;
            font-size: 1rem;
            opacity: 0.6;
        }

        #nav a::before {
            content: "↳ ";
            opacity: 0.4;
        }

        #nav a:hover {
            opacity: 1.0;
        }

        #info {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(180, 200, 255, 0.45);
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 0.15em;
            text-align: center;
            pointer-events: none;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <nav id="nav" class="visible">
        <a href="../../index.html">home</a>
    </nav>
    <canvas id="c"></canvas>
    <div id="info">Cassiopeia A — Supernova Remnant</div>
    <div id="ui">· Scroll to zoom · Drag to orbit</div>
  <div id="radio-player" class="radio-player" aria-hidden="false">
    <div class="radio-controls-compact">
      <svg class="music-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16"
        fill="var(--accent)">
        <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z" />
      </svg>
      <button class="radio-play" aria-label="Play/Pause" data-playing="false">▶</button>
      <button id="radio-minimize" aria-label="Toggle Radio">
        <!-- Minimize: horizontal bar -->
        <svg class="radio-icon" width="14" height="14" viewBox="0 0 24 24" fill="none">
          <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2" />
        </svg>
      </button>
    </div>
    <div class="radio-progress" title="Live progress">
      <div class="radio-progress-fill"></div>
    </div>
    <input class="radio-volume" type="range" min="0" max="1" step="0.01" value="0.5" aria-label="Volume">
  </div>
    <script type="module" src="/js/supernova.js"></script>
    <script type="module" src="/js/radio.js"></script>
</body>

</html>
