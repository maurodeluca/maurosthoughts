<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — NOT FOUND</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #39ff14;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;
    }
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 10;
    }
    .code {
      font-size: 6rem;
      font-weight: bold;
      letter-spacing: 0.15em;
      text-shadow: 0 0 30px rgba(57,255,20,0.4), 0 0 60px rgba(57,255,20,0.15);
      animation: flicker 3s infinite;
    }
    .msg {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #888;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .sub {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.15em;
      max-width: 360px;
      line-height: 1.6;
    }
    .back {
      margin-top: 2.5rem;
      display: inline-block;
      color: #39ff14;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      border: 1px solid #1a3a1a;
      padding: 10px 24px;
      border-radius: 6px;
      transition: all 0.3s ease;
    }
    .back:hover {
      border-color: #39ff14;
      box-shadow: 0 0 20px rgba(57,255,20,0.15);
      text-shadow: 0 0 10px rgba(57,255,20,0.5);
    }
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.3; }
      94% { opacity: 1; }
      96% { opacity: 0.5; }
      97% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <div class="code">404</div>
  <div class="msg">signal not found</div>
  <div class="sub">This world hasn't loaded yet.<br>The maze is still being built.</div>
  <a href="../../index.html" class="back">← RETURN TO BASE</a>
</body>
</html>
